<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex,nofollow">
<title>Checkout Cancelled — Alpha Course</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080c;color:#f5f5f7;font-family:'Inter',-apple-system,system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
.card{max-width:460px;width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:48px 36px}
h1{font-size:24px;font-weight:900;margin-bottom:10px}
.sub{font-size:15px;color:rgba(245,245,247,.6);margin-bottom:28px}
.btn{display:inline-block;padding:14px 26px;background:transparent;border:1px solid rgba(255,255,255,.18);color:#f5f5f7;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none}
.btn:hover{border-color:rgba(255,255,255,.35)}
</style>
</head>
<body>
<div class="card">
  <h1>Checkout cancelled</h1>
  <p class="sub">No charge was made. You can resume enrollment from your dashboard whenever you're ready.</p>
  <a href="/" class="btn">Back to course overview</a>
</div>
</body>
</html>
