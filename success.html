<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Payment Successful</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0f;color:#fff;font-family:'Inter',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
  .card{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.3);border-radius:16px;padding:40px 32px;max-width:480px}
  h1{color:#4ade80;font-size:28px;margin-bottom:14px;font-weight:900}
  p{color:rgba(255,255,255,.7);font-size:15px;line-height:1.55;margin-bottom:10px}
  .small{color:rgba(255,255,255,.4);font-size:12px;margin-top:18px}
  .btn{display:inline-block;margin-top:22px;padding:16px 28px;background:linear-gradient(135deg,#7c3aed,#6366f1);color:#fff;text-decoration:none;font-weight:800;font-size:16px;border-radius:10px;transition:opacity .15s}
  .btn:hover{opacity:.88}
</style>
</head>
<body>
<div class="card">
  <h1>&#10003; Payment Successful</h1>
  <p>Thank you. Your one-time payment has been processed and your access has been unlocked.</p>
  <p style="margin-bottom:0;color:#fcd34d">Click below to continue and your tier will refresh.</p>
  <a class="btn" href="https://pornyard.xyz/?payment=success" rel="noreferrer">Continue to your account &rarr;</a>
  <p class="small">A receipt has been emailed to you.</p>
</div>
</body>
</html>
