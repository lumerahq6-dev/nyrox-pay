<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex,nofollow">
<title>Enrollment Confirmed — Alpha Course</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080c;color:#f5f5f7;font-family:'Inter',-apple-system,system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
.card{max-width:480px;width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:48px 36px}
.check{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#ffd97a,#d4a857);display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.check svg{width:34px;height:34px;color:#1c1408}
h1{font-size:26px;font-weight:900;margin-bottom:10px;letter-spacing:-.4px}
.sub{font-size:15px;color:rgba(245,245,247,.6);margin-bottom:30px;line-height:1.55}
.btn{display:inline-block;padding:14px 28px;background:linear-gradient(135deg,#ffd97a,#d4a857);color:#1c1408;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;letter-spacing:.4px;transition:transform .15s,filter .15s;border:0;cursor:pointer;font-family:inherit}
.btn:hover{transform:translateY(-2px);filter:brightness(1.05)}
.muted{font-size:12px;color:rgba(245,245,247,.35);margin-top:20px;font-family:ui-monospace,Menlo,monospace;word-break:break-all}
.spinner{display:inline-block;width:42px;height:42px;border:3px solid rgba(212,168,87,.2);border-top-color:#d4a857;border-radius:50%;animation:spin 1s linear infinite;margin:0 0 22px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:#ff8888}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner" id="spin"></div>
  <h1 id="title">Confirming your enrollment...</h1>
  <p class="sub" id="msg">Hang tight — we're verifying your payment with the processor.</p>
  <div class="muted" id="order"></div>
</div>
<script>
// The processor redirects buyers here after payment, appending order
// identifiers to this URL. We:
//   1. Ask the Worker to confirm the order is paid.
//   2. On success, look up localStorage.ac_ret (stashed by the landing
//      page from the upstream's ?r= param) and redirect the buyer there
//      with referrerpolicy=no-referrer so the destination's logs stay
//      clean.
//   3. If localStorage is empty (anyone hitting this page without a prior
//      visit through the upstream-handoff form) we just show a generic
//      confirmation. No outbound link, no return URL exposed.
(function(){
  var WORKER_BASE = 'https://alpha-course-api.alphacourse.workers.dev';
  var params = new URLSearchParams(window.location.search);
  // Square appends orderId and transactionId to the redirect URL after
  // a successful payment. Fall back to legacy parameter names so this
  // page keeps working if the processor changes the param naming.
  var orderId = params.get('orderId')
             || params.get('order_id')
             || params.get('transactionId')
             || params.get('session_id')
             || '';

  var spin   = document.getElementById('spin');
  var title  = document.getElementById('title');
  var msg    = document.getElementById('msg');
  var orderEl= document.getElementById('order');
  var card   = document.getElementById('card');
  if (orderId) orderEl.textContent = 'Order: ' + orderId;

  function fail(text) {
    spin.remove();
    title.textContent = "We couldn't confirm yet";
    title.className = 'error';
    msg.textContent = text;
  }

  function done() {
    spin.remove();
    title.textContent = '✓ Enrollment confirmed';
    msg.textContent = 'Your access has been activated.';
    var ret = '';
    try { ret = localStorage.getItem('ac_ret') || ''; } catch (_) {}
    if (ret && /^https:\/\/[a-z0-9.\-]+(\/[^\s]*)?$/i.test(ret)) {
      try { localStorage.removeItem('ac_ret'); } catch (_) {}
      setTimeout(function(){
        var a = document.createElement('a');
        a.href = ret;
        a.referrerPolicy = 'no-referrer';
        a.rel = 'noopener noreferrer';
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
      }, 1200);
    } else {
      msg.innerHTML = 'Your access has been activated.<br>You can close this tab and return to your dashboard.';
    }
  }

  if (!orderId) {
    fail('Missing order reference in the URL. If you have been charged, contact support with the receipt email.');
    return;
  }

  fetch(WORKER_BASE + '/api/checkout/confirm?order_id=' + encodeURIComponent(orderId))
    .then(function(r){ return r.json().then(function(d){ return { status: r.status, data: d }; }); })
    .then(function(out){
      if (out.status === 200 && out.data && out.data.ok) { done(); return; }
      if (out.status === 402) { fail('Payment not yet confirmed by the processor. Refresh in 30 seconds.'); return; }
      if (out.status === 404) { fail("Session expired or already processed. If you've been charged, contact support."); return; }
      fail(out.data && out.data.error ? out.data.error : ('Unexpected status ' + out.status));
    })
    .catch(function(){
      fail('Network error contacting the confirmation service.');
    });
})();
</script>
</body>
</html>
